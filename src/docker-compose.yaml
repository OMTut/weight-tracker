services:
  api:
    build: ./api
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////app/data/db.sqlite
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      ALLOW_PASSWORD_RESET: ${ALLOW_PASSWORD_RESET:-false}
    volumes:
      - sqlite_data:/app/data

  web:
    build: ./web
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - api

volumes:
  sqlite_data:
