services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: weighttracker
      POSTGRES_PASSWORD: weighttracker
      POSTGRES_DB: weighttracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weighttracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://weighttracker:weighttracker@db:5432/weighttracker
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - api

volumes:
  postgres_data:
