services:
  api:
    build: ./api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////app/data/db.sqlite
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - sqlite_data:/app/data

  web:
    build: ./web
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - api

volumes:
  sqlite_data:
